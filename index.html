<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt — e-Pickeur Mixte | Balea — V18</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --abyss:     #2D3E50;
  --abyss-dk:  #1E2D3D;
  --abyss-lt:  #3D5166;
  --sunset:    #F5A623;
  --sunset-dk: #D4881A;
  --lagoon:    #1A8FA0;
  --lagoon-lt: #22B0C5;
  --white:     #FFFFFF;
  --light:     #F4F6F8;
  --border:    #E2E8EE;
  --muted:     #7A8A99;
  --font:      'Barlow', sans-serif;
  --font-cond: 'Barlow Condensed', sans-serif;
  --row-h:     48px;
  --label-w:   420px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--light); color:var(--abyss); min-height:100vh; overflow-x:hidden; }

/* ── HEADER ── */
header {
  background: var(--abyss);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  position: sticky;
  top: 0;
  z-index: 300;
  box-shadow: 0 2px 16px rgba(0,0,0,.3);
}
.h-left { display:flex; align-items:center; gap:16px; }
.balea-logo { display:flex; align-items:center; text-decoration:none; }
.balea-logo img {
  height: 34px;
  width: auto;
  display: block;
  background: var(--white);
  padding: 3px 8px;
  border-radius: 3px;
}
.h-sep { width:1px; height:24px; background:rgba(255,255,255,.2); }
.h-project { font-size:12px; font-weight:600; color:rgba(255,255,255,.55); text-transform:uppercase; letter-spacing:.1em; }
.h-right { display:flex; align-items:center; gap:12px; }
.sync-pill {
  display:flex; align-items:center; gap:7px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  border-radius:20px; padding:4px 12px;
  font-size:11px; color:rgba(255,255,255,.7); font-weight:500; letter-spacing:.04em;
}
.sync-dot { width:7px; height:7px; border-radius:50%; background:#4CD07D; box-shadow:0 0 6px #4CD07D; flex-shrink:0; }
.sync-dot.loading { background:var(--sunset); box-shadow:0 0 6px var(--sunset); animation:blink .7s ease-in-out infinite alternate; }
.sync-dot.error   { background:#FF5C5C; box-shadow:0 0 6px #FF5C5C; animation:none; }
@keyframes blink { from{opacity:.4} to{opacity:1} }

/* ── TABS ── */
.tabs-bar {
  background:var(--abyss-dk); padding:0 32px;
  display:flex; border-bottom:3px solid rgba(0,0,0,.2);
}
.tab-btn {
  font-family:var(--font-cond); font-size:13px; font-weight:700;
  text-transform:uppercase; letter-spacing:.08em;
  color:rgba(255,255,255,.4); background:none; border:none;
  border-bottom:3px solid transparent; padding:13px 20px;
  cursor:pointer; margin-bottom:-3px; transition:all .2s;
}
.tab-btn:hover { color:rgba(255,255,255,.8); }
.tab-btn.active { color:var(--sunset); border-bottom-color:var(--sunset); }

/* ── TOOLBAR ── */
.toolbar {
  background:var(--white); padding:10px 32px;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}
.filter-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-right:2px; }
.chip {
  font-family:var(--font-cond); font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em;
  padding:4px 12px; border-radius:2px;
  border:1.5px solid var(--border); background:var(--light); color:var(--muted);
  cursor:pointer; transition:all .15s;
}
.chip:hover { border-color:var(--abyss); color:var(--abyss); }
.chip.on { background:var(--sunset); border-color:var(--sunset); color:var(--white); }

.zoom-group { display:flex; align-items:center; gap:4px; margin-left:8px; }
.zoom-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-right:4px; }
.zoom-btn {
  font-family:var(--font-cond); font-size:11px; font-weight:700;
  padding:4px 10px; border-radius:2px;
  border:1.5px solid var(--border); background:var(--light); color:var(--muted);
  cursor:pointer; transition:all .15s;
}
.zoom-btn:hover, .zoom-btn.on { background:var(--abyss); border-color:var(--abyss); color:var(--white); }

.btn-refresh {
  margin-left:auto; font-family:var(--font); font-size:12px; font-weight:600;
  color:var(--muted); background:none; border:1.5px solid var(--border); border-radius:2px;
  padding:5px 14px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .15s;
}
.btn-refresh:hover { color:var(--abyss); border-color:var(--abyss); }
.btn-refresh svg { transition:transform .4s; }
.btn-refresh:hover svg { transform:rotate(180deg); }

/* ── TODAY LEGEND ── */
.legend-bar {
  background:var(--white); padding:6px 32px;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  border-bottom:1px solid var(--border);
  font-size:11px; color:var(--muted);
}
.legend-item { display:flex; align-items:center; gap:6px; }
.legend-dot  { width:10px; height:10px; border-radius:50%; }

/* ── GANTT WRAPPER ── */
#gantt-wrap {
  width:100%; overflow-x:auto; overflow-y:auto;
  max-height:calc(100vh - 180px);
  background:var(--white);
}

/* ── GANTT TABLE ── */
.gantt-table {
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 100%;
  font-size: 12px;
}

/* Sticky left column */
.gantt-table td.g-label,
.gantt-table th.g-label {
  position: sticky;
  left: 0;
  z-index: 10;
  width: var(--label-w);
  min-width: var(--label-w);
  max-width: var(--label-w);
  background: var(--white);
  border-right: 2px solid var(--border);
}

/* ── HEADER ROW: MONTHS ── */
.thead-months th {
  height: 28px;
  font-family: var(--font-cond);
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--white);
  background: var(--abyss);
  border-right: 1px solid var(--abyss-lt);
  padding: 0 6px;
  white-space: nowrap;
  overflow: hidden;
  text-align: center;
}
.thead-months th.g-label {
  background: var(--abyss-dk);
  color: rgba(255,255,255,.5);
  font-size: 10px;
  text-align: left;
  padding-left: 12px;
  border-right: 2px solid rgba(0,0,0,.3);
}

/* ── HEADER ROW: WEEKS ── */
.thead-weeks th {
  height: 22px;
  font-family: var(--font-cond);
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,.6);
  background: var(--abyss-lt);
  border-right: 1px solid rgba(0,0,0,.15);
  padding: 0 2px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
}
.thead-weeks th.g-label {
  background: var(--abyss-dk);
  border-right: 2px solid rgba(0,0,0,.3);
}
.thead-weeks th.today-week {
  background: var(--sunset-dk);
  color: var(--white);
}

/* ── PHASE HEADER ROW ── */
tr.phase-row td {
  height: 28px;
  background: var(--light);
  border-bottom: 1px solid var(--border);
}
tr.phase-row td.g-label {
  background: var(--light);
  padding-left: 10px;
}
.phase-tag {
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--font-cond); font-size:11px; font-weight:800;
  text-transform:uppercase; letter-spacing:.1em;
  color:var(--white); background:var(--lagoon);
  padding:2px 10px; border-radius:2px;
}

/* ── TASK ROW ── */
tr.task-row td {
  height: var(--row-h);
  border-bottom: 1px solid var(--border);
  background: var(--white);
  vertical-align: middle;
  padding: 0;
}
tr.task-row:hover td { background: #f0f7ff; }

tr.task-row td.g-label {
  padding: 0 10px 0 16px;
  background: var(--white);
}
tr.task-row:hover td.g-label { background: #f0f7ff; }

.label-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: hidden;
}
.label-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.label-name {
  font-size: 12px; font-weight: 600; color: var(--abyss);
  white-space: normal; overflow: visible; word-break: break-word;
  flex: 1; line-height: 1.3;
}
.label-badges { display:flex; gap:3px; flex-shrink:0; }
.bdg {
  font-family:var(--font-cond); font-size:9px; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em;
  padding:1px 5px; border-radius:1px; white-space:nowrap;
}
.bdg-p0 { background:var(--lagoon); color:var(--white); }
.bdg-p1 { background:var(--abyss); color:var(--white); }
.bdg-p2 { background:var(--muted); color:var(--white); }
.bdg-ver { background:var(--light); color:var(--muted); border:1px solid var(--border); }

/* ── GANTT CELL ── */
td.g-day {
  padding: 0;
  position: relative;
  min-width: 0;
}
td.g-day.weekend { background: #f7f8fa; }
td.g-day.today-col { background: #fffbf0; }
td.g-day.today-col::after {
  content:'';
  position:absolute; top:0; left:50%; bottom:0;
  width:2px; background:var(--sunset); opacity:.5; transform:translateX(-50%);
}

/* BAR */
.bar {
  position: absolute;
  top: 6px; bottom: 6px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  padding: 0 6px;
  overflow: hidden;
  cursor: pointer;
  transition: filter .15s, transform .15s;
  z-index: 2;
}
.bar:hover { filter: brightness(1.1); transform: scaleY(1.08); z-index: 5; }

.bar-label {
  font-family: var(--font-cond);
  font-size: 10px;
  font-weight: 700;
  color: var(--white);
  white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,.2);
  pointer-events: none;
}

.bar.s-encours  { background: linear-gradient(90deg, var(--sunset-dk), var(--sunset)); }
.bar.s-termine  { background: linear-gradient(90deg, #27AE60, #4CD07D); }
.bar.s-bloque   { background: linear-gradient(90deg, #C0392B, #FF5C5C); }
.bar.s-default  { background: linear-gradient(90deg, #B0BEC5, #CFD8DC); }

/* progress stripe on "en cours" */
.bar.s-encours::before {
  content:'';
  position:absolute; top:0; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 6px,
    rgba(255,255,255,.12) 6px,
    rgba(255,255,255,.12) 12px
  );
  border-radius: 3px;
  pointer-events:none;
}

/* TODAY LINE - absolute overlay on thead */
.today-marker {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--sunset);
  z-index: 50;
  pointer-events: none;
}
.today-marker::before {
  content: 'Aujourd\'hui';
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-cond);
  font-size: 9px;
  font-weight: 800;
  color: var(--sunset);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: .06em;
}

/* TOOLTIP */
.tooltip {
  position: fixed;
  background: var(--abyss);
  color: var(--white);
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  pointer-events: none;
  z-index: 999;
  max-width: 260px;
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
  display: none;
}
.tooltip b { color: var(--sunset); font-family:var(--font-cond); font-size:13px; }
.tooltip .tt-meta { color:rgba(255,255,255,.6); font-size:11px; margin-top:3px; }

/* STATE MESSAGES */
.state-msg {
  text-align:center; padding:80px 20px; color:var(--muted);
}
.state-msg .ico { font-size:44px; margin-bottom:16px; }
.state-msg h3 { font-size:17px; font-weight:700; color:var(--abyss); margin-bottom:8px; }
.state-msg p  { font-size:13px; line-height:1.6; }

/* FOOTER */
footer {
  text-align:center; padding:20px; font-size:11px;
  color:var(--muted); font-weight:500; border-top:1px solid var(--border); letter-spacing:.04em;
}
footer b { color:var(--lagoon); }

@media (max-width:640px) {
  :root { --label-w: 140px; }
  header, .tabs-bar, .toolbar, .legend-bar { padding-left:16px; padding-right:16px; }
  .h-project { display:none; }
}
</style>
</head>

<script>
const SHEET_ID   = '1Lp4uzgPkwa2BdIEQMroBQZ0j75GTYasQg0Pi1ywtHGY';
// ⚠️ Remplace cette URL par celle de ton Apps Script déployé
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtZzMRDVQEdVE_TuIIz9vut2EJ2kDr7AgzpGEo_BxfJ2MnvMMA53TV4fWcFp8vnO6grA/exec';
const TABS = ['Software','Hardware'];
const GIDS = [0, 198443496]; // Software=Planning DEVCON (gid=0), Hardware=Planning installation (gid=198443496)
const REFRESH_MS = 60000;
const MONTHS_FR  = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const MONTHS_FULL= ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let allData  = [[],[]];
let tabIdx   = 0;
let filter   = 'all';
let zoom     = 'month'; // 'week' | 'month' | 'quarter'
let timer    = null;

/* ── FETCH ── */
function fetchSheet(name, gid) {
  // JSONP — contourne CORS depuis GitHub Pages / Netlify
  return new Promise((resolve, reject) => {
    if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'APPS_SCRIPT_URL_ICI') {
      reject(new Error('Configure APPS_SCRIPT_URL dans le code'));
      return;
    }
    const cbName = 'cb_' + name.replace(/[^a-zA-Z0-9]/g,'_') + '_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      delete window[cbName];
      document.head.removeChild(script);
      reject(new Error('Timeout fetch ' + name));
    }, 10000);

    window[cbName] = function(json) {
      clearTimeout(timeout);
      delete window[cbName];
      document.head.removeChild(script);
      if(json.error) { reject(new Error(json.error)); return; }
      resolve(parseFlat(json, gid));
    };

    const sheetMap = {'Software':'Planning DEVCON','Hardware':'Planning installation'};
    const realName = sheetMap[name] || name;
    script.src = APPS_SCRIPT_URL + '?sheet=' + encodeURIComponent(realName) + '&callback=' + cbName;
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[cbName];
      reject(new Error('Script load error for ' + name));
    };
    document.head.appendChild(script);
  });
}

function parseFlat(data, gid) {
  const headers = data.headers || [];
  const rows = (data.rows || []).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (row[i] !== null && row[i] !== undefined) ? String(row[i]) : ''; });
    return obj;
  });
  const isHardware = (gid === 198443496);
  if(isHardware) {
    const getName = r => r['Tache']||r['tache']||'';
    const getBatch = r => r['Batch']||r['batch']||'';
    const getDebut = r => r['Début']||r['Debut']||r['début']||'';
    const getFin   = r => r['Fin']||r['fin']||'';
    const getQty   = r => r['Quantité']||r['Quantite']||'';
    const getJours = r => r['Jours']||r['jours']||'';
    return rows.filter(r => getName(r) && getName(r) !== 'Tache').map(r => ({
      'Tâche': getName(r), 'Lotissement': getBatch(r)?'Batch '+getBatch(r):'Hardware',
      'État':'','Priorité':'','Versions':'','Cycle':'','Propriétaire':'',
      'Date de début': getDebut(r), 'Date de fin': getFin(r),
      'Notes': (getQty(r)?'Qté: '+getQty(r):'')+(getJours(r)?' · '+getJours(r)+' j':'')
    }));
  }
  return rows.filter(r => r['Tâche'] && r['Tâche'] !== '' && r['Tâche'] !== 'Tâche');
}

function parseGviz(json, gid) {
  const table = json.table;
  if(!table||!table.cols||!table.rows) return [];
  const headers = table.cols.map(c => (c.label||c.id||'').trim());

  const rawRows = table.rows
    .filter(row => row && row.c)
    .map(row => {
      const obj = {};
      headers.forEach((h, i) => {
        const cell = row.c[i];
        let val = '';
        if(cell && cell.v !== null && cell.v !== undefined) {
          if(typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
            const parts = cell.v.replace('Date(','').replace(')','').split(',').map(Number);
            const d = new Date(parts[0], parts[1], parts[2]);
            val = String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
          } else {
            val = cell.f !== null && cell.f !== undefined ? String(cell.f) : String(cell.v);
          }
        }
        obj[h] = val.trim();
        // Stocke aussi par index pour fallback
        obj['_col'+i] = val.trim();
      });
      return obj;
    });

  // Détection par GID — Hardware=1953740944, Software=643382955
  const isHardware = (gid === 198443496);
  console.log('[Balea] GID='+gid+' isHardware='+isHardware+' headers='+JSON.stringify(headers));

  if(isHardware) {
    // Schema Hardware: col0=Batch, col1=Tache, col2=Quantité, col3=Début, col4=Fin, col5=Jours, col6=Semaine
    // On utilise le label si dispo, sinon l'index
    const getName = (r) => r['Tache']||r['tache']||r['TACHE']||r['_col1']||'';
    const getBatch = (r) => r['Batch']||r['batch']||r['BATCH']||r['_col0']||'';
    const getDebut = (r) => r['Début']||r['Debut']||r['début']||r['debut']||r['_col3']||'';
    const getFin   = (r) => r['Fin']||r['fin']||r['FIN']||r['_col4']||'';
    const getQty   = (r) => r['Quantité']||r['Quantite']||r['_col2']||'';
    const getJours = (r) => r['Jours']||r['jours']||r['_col5']||'';

    return rawRows
      .filter(r => getName(r) && getName(r) !== '' && getName(r) !== 'Tache')
      .map(r => ({
        'Tâche':         getName(r),
        'Lotissement':   getBatch(r) ? 'Batch '+getBatch(r) : 'Sans batch',
        'État':          '',
        'Priorité':      '',
        'Versions':      '',
        'Cycle':         '',
        'Propriétaire':  '',
        'Date de début': getDebut(r),
        'Date de fin':   getFin(r),
        'Notes':         (getQty(r)?'Qté : '+getQty(r):'') + (getJours(r)?' · '+getJours(r)+' j':'')
      }));
  } else {
    return rawRows.filter(r => r['Tâche'] && r['Tâche'] !== '' && r['Tâche'] !== 'Tâche');
  }
}


/* ── LOAD ── */
async function loadData() {
  setSync('loading','Synchronisation…');
  let hasData=false;
  for(let i=0;i<TABS.length;i++){
    try {
      const rows = await fetchSheet(TABS[i], GIDS[i]);
      allData[i] = rows;
      hasData=true;
      console.log('[Balea] ' + TABS[i] + ' : ' + rows.length + ' lignes');
    } catch(e) {
      allData[i] = [];
      console.error('[Balea] Erreur ' + TABS[i] + ' : ' + e.message);
    }
  }
  const t = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  setSync(hasData?'ok':'error', hasData?('Synchro '+t):'Erreur de chargement');
  render();
}

function setSync(s,lbl){
  const d=document.getElementById('syncDot');
  d.className='sync-dot'+(s==='loading'?' loading':s==='error'?' error':'');
  document.getElementById('syncLabel').textContent=lbl;
}

/* ── DATE HELPERS ── */
function parseDate(s) {
  if(!s||s==='dd/mm/yyyy'||s==='30/12/1899') return null;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){
    const [j,m,a]=s.split('/');
    return new Date(+a, +m-1, +j);
  }
  const d=new Date(s);
  return isNaN(d)?null:d;
}

function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function startOfDay(d){ const r=new Date(d); r.setHours(0,0,0,0); return r; }
function diffDays(a,b){ return Math.round((startOfDay(b)-startOfDay(a))/(864e5)); }
function startOfMonth(d){ return new Date(d.getFullYear(),d.getMonth(),1); }
function endOfMonth(d){ return new Date(d.getFullYear(),d.getMonth()+1,0); }
function startOfWeek(d){ const r=new Date(d); const day=r.getDay(); const diff=day===0?-6:1-day; r.setDate(r.getDate()+diff); return startOfDay(r); }

/* ── COL WIDTH BY ZOOM ── */
function colW(){
  if(zoom==='week')    return 28;
  if(zoom==='month')   return 14;
  if(zoom==='quarter') return 6;
  return 8;
}

/* ── BUILD COLUMNS ── */
function buildCols(minDate, maxDate){
  const cols=[];
  if(zoom==='week'){
    // one col = 1 day
    let d=startOfDay(minDate);
    const end=startOfDay(maxDate);
    while(d<=end){ cols.push({date:new Date(d), type:'day'}); d=addDays(d,1); }
  } else if(zoom==='month'){
    // one col = 1 week (Mon)
    let d=startOfWeek(minDate);
    const end=startOfDay(maxDate);
    while(d<=end){ cols.push({date:new Date(d), type:'week'}); d=addDays(d,7); }
  } else {
    // one col = 1 month
    let d=new Date(minDate.getFullYear(), minDate.getMonth(), 1);
    while(d<=maxDate){
      cols.push({date:new Date(d), type:'month'});
      d=new Date(d.getFullYear(), d.getMonth()+1, 1);
    }
  }
  return cols;
}

/* ── RENDER ── */
function render(){
  const wrap = document.getElementById('gantt-wrap');
  let rows = allData[tabIdx]||[];
  if(filter!=='all') rows=rows.filter(r=>norm(r['État']||'')===norm(filter));

  if(!rows.length){
    wrap.innerHTML=`<div class="state-msg"><div class="ico">📋</div><h3>Aucune donnée</h3><p>L'onglet "${TABS[tabIdx]}" est vide ou le Sheet n'est pas public.</p></div>`;
    return;
  }

  // Compute date range
  const today = startOfDay(new Date());
  let minD=today, maxD=today;
  rows.forEach(r=>{
    const d1=parseDate(r['Date de début']||r['Date de debut']||'');
    const d2=parseDate(r['Date de fin']||'');
    if(d1&&d1<minD) minD=d1;
    if(d1&&d1>maxD) maxD=d1;
    if(d2&&d2<minD) minD=d2;
    if(d2&&d2>maxD) maxD=d2;
  });
  // Pad
  minD = addDays(startOfDay(minD), -14);
  maxD = addDays(startOfDay(maxD),  21);

  const cols  = buildCols(minD, maxD);
  const CW    = colW();
  const todayIdx = cols.findIndex(c=>{
    const cd=startOfDay(c.date);
    if(zoom==='week') return diffDays(cd,today)===0;
    if(zoom==='month') return diffDays(cd,today)>=0 && diffDays(cd,today)<7;
    return c.date.getFullYear()===today.getFullYear() && c.date.getMonth()===today.getMonth();
  });

  // Group rows by phase
  const groups={};
  rows.forEach(r=>{
    const g=r['Lotissement']||'Sans phase';
    if(!groups[g]) groups[g]=[];
    groups[g].push(r);
  });

  // Build months header (merge cols by month)
  let monthCols=[];
  cols.forEach((c,i)=>{
    const key=`${c.date.getFullYear()}-${c.date.getMonth()}`;
    const last=monthCols[monthCols.length-1];
    if(last&&last.key===key) last.span++;
    else monthCols.push({key, label:`${MONTHS_FR[c.date.getMonth()]} ${c.date.getFullYear()}`, span:1});
  });

  let html=`<table class="gantt-table" id="gantt-tbl">`;
  // Colgroup pour forcer les largeurs
  html += `<colgroup><col style="width:${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-w')||'420')}px">`;
  cols.forEach(() => { html += `<col style="width:${CW}px;min-width:${CW}px;max-width:${CW}px">`; });
  html += `</colgroup>`;

  // ROW 1: months
  html+=`<thead><tr class="thead-months"><th class="g-label">Tâche</th>`;
  monthCols.forEach(m=>{
    html+=`<th colspan="${m.span}" style="min-width:${m.span*CW}px">${m.span*CW>40?m.label:MONTHS_FR[new Date(m.key+'-01').getMonth()]}</th>`;
  });
  html+=`</tr>`;

  // ROW 2: weeks / days / months sub-header
  html+=`<tr class="thead-weeks"><th class="g-label"></th>`;
  cols.forEach((c,i)=>{
    const isToday=(i===todayIdx);
    let lbl='';
    if(zoom==='week') lbl=c.date.getDate();
    else if(zoom==='month'){ const w=Math.ceil(c.date.getDate()/7); lbl=`S${getWeekNum(c.date)}`; }
    else lbl=MONTHS_FR[c.date.getMonth()];
    html+=`<th class="${isToday?'today-week':''}" style="min-width:${CW}px;max-width:${CW}px">${lbl}</th>`;
  });
  html+=`</tr></thead><tbody>`;

  // DATA ROWS
  Object.entries(groups).forEach(([phase,tasks])=>{
    html+=`<tr class="phase-row"><td class="g-label"><span class="phase-tag">${esc(phase)}</span></td>`;
    cols.forEach(()=>{ html+=`<td></td>`; });
    html+=`</tr>`;

    tasks.forEach(t=>{
      const sc  = stateClass(t['État']||t['Etat']||'');
      const pr  = t['Priorité']||t['Priorite']||'';
      const ver = t['Versions']||'';
      const name= t['Tâche']||'';
      const d1  = parseDate(t['Date de début']||t['Date de debut']||'');
      const d2  = parseDate(t['Date de fin']||'');

      // Dot color for label
      const dotColor = sc==='s-encours'?'var(--sunset)':sc==='s-termine'?'#4CD07D':sc==='s-bloque'?'#FF5C5C':'#CFD8DC';

      html+=`<tr class="task-row ${sc}">
        <td class="g-label">
          <div class="label-inner">
            <div class="label-dot" style="background:${dotColor}"></div>
            <span class="label-name" title="${esc(name)}">${esc(name)}</span>
            <div class="label-badges">
              ${pr?`<span class="bdg bdg-${pr.toLowerCase()}">${esc(pr)}</span>`:''}
              ${ver?`<span class="bdg bdg-ver">${esc(ver)}</span>`:''}
            </div>
          </div>
        </td>`;

      // Calculate bar position
      let barStartCol=-1, barEndCol=-1;
      if(d1){
        const d1t = startOfDay(d1);
        const d2t = d2 ? startOfDay(d2) : d1t;
        for(let ci=0; ci<cols.length; ci++){
          const cs = startOfDay(cols[ci].date);
          const ce = zoom==='week'   ? addDays(cs,1) :
                     zoom==='month'  ? addDays(cs,7) :
                     new Date(cs.getFullYear(), cs.getMonth()+1, 1);
          if(d1t < ce && d2t >= cs){
            if(barStartCol===-1) barStartCol=ci;
            barEndCol=ci;
          }
        }
        barSpan = (barStartCol!==-1) ? (barEndCol - barStartCol + 1) : 0;
        if(barStartCol!==-1 && barSpan===0) barSpan=1;
      }

      // Render cells — bar spans across multiple tds using absolute positioning in first cell
      cols.forEach((c,i)=>{
        const isWE = c.date.getDay()===0||c.date.getDay()===6;
        const isToday = i===todayIdx;
        let cls='g-day';
        if(isWE&&zoom==='week') cls+=' weekend';
        if(isToday) cls+=' today-col';

        if(i===barStartCol&&barSpan>0){
          const barW = Math.max(barSpan*CW - 4, 8);
          const tooltip=`data-tt="${esc(name)}|${t['État']||''}|${fmtD(d1)} → ${fmtD(d2)}|${t['Cycle']||''}|${t['Propriétaire']||''}"`;
          html+=`<td class="${cls}" style="position:relative">
            <div class="bar ${sc}" style="left:2px;width:${barW}px" ${tooltip} onmouseenter="showTT(event,this)" onmouseleave="hideTT()">
              <span class="bar-label">${barSpan*CW>30?esc(name):''}</span>
            </div>
          </td>`;
        } else {
          html+=`<td class="${cls}"></td>`;
        }
      });

      html+=`</tr>`;
    });
  });

  html+=`</tbody></table>`;
  wrap.innerHTML=html;

  // Scroll to today
  if(todayIdx>0){
    const labelW=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-w'))||230;
    wrap.scrollLeft = Math.max(0, todayIdx*CW - wrap.clientWidth/2 + labelW);
  }
}

function showError(msg){
  document.getElementById('gantt-wrap').innerHTML=`<div class="state-msg">
    <div class="ico">⚠️</div>
    <h3>Impossible de charger les données</h3>
    <p>Vérifiez que le Google Sheet est partagé en <b>"Toute personne avec le lien — Lecteur"</b>.<br>
    <small style="font-size:10px;opacity:.5;display:block;margin-top:8px">${esc(msg)}</small></p>
  </div>`;
}

/* ── TOOLTIP ── */
function showTT(e,el){
  const tt=document.getElementById('tooltip');
  const parts=(el.getAttribute('data-tt')||'').split('|');
  const [name,etat,dates,cycle,owner]=parts;
  let html=`<b>${name}</b><br>`;
  if(etat)  html+=`État : ${etat}<br>`;
  if(dates&&dates.trim()!=='→') html+=`${dates}<br>`;
  if(cycle) html+=`Cycle : ${cycle}<br>`;
  if(owner&&owner!=='Name') html+=`<span class="tt-meta">👤 ${owner}</span>`;
  tt.innerHTML=html;
  tt.style.display='block';
  moveTT(e);
}
function moveTT(e){
  const tt=document.getElementById('tooltip');
  if(tt.style.display==='none') return;
  tt.style.left=(e.clientX+14)+'px';
  tt.style.top=(e.clientY-10)+'px';
}
function hideTT(){ document.getElementById('tooltip').style.display='none'; }
document.addEventListener('mousemove',moveTT);

/* ── HELPERS ── */
function stateClass(s){
  const n=norm(s);
  if(n.includes('cours'))   return 's-encours';
  if(n.includes('termin')||n.includes('stable')||n==='ga') return 's-termine';
  if(n.includes('bloq'))    return 's-bloque';
  return 's-default';
}
function norm(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function fmtD(d){ if(!d) return '—'; return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'2-digit'}); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getWeekNum(d){
  const jan1=new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-jan1)/864e5+jan1.getDay()+1)/7);
}

/* ── CONTROLS ── */
function switchTab(i,btn){
  tabIdx=i;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setFilter(v,btn){
  filter=v;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function setZoom(z,btn){
  zoom=z;
  document.querySelectorAll('.zoom-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

/* ── INIT ── */
loadData();
timer=setInterval(loadData, REFRESH_MS);
</script>
